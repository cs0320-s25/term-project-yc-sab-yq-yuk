server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    # Postgres via Supabase Session Pooler (IPv4-compatible)
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:aws-1-us-east-2.pooler.supabase.com}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USERNAME:postgres.qbozkmwkimxcharmwgpn}
    password: ${DB_PASSWORD:5WrrP7ly1YwiTSpY}

# CORS allowed origins — override with env var in production
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8000}

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.map.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      map:
        mapper: debug
        service: info
        controller: info